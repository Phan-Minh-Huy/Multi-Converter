<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Multi-Converter | Smart Web Tools</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="background-blobs"></div>

    <nav class="navbar">
      <a href="../index.html" class="logo">Multi-Converter<span>.net</span></a>
      <div class="nav-links">
        <a href="../index.html">Calculator</a>
        <a href="../temp_converter/index.html">Temperature</a>
        <a href="../currency_converter/index.html">Exchange Rate</a>
        <a href="../tech_converter/index.html">Tech Tools</a>
        <a href="index.html" class="active-link">File Converter</a>
      </div>
    </nav>

    <div class="page-content">
      <div class="file-container">
        <section class="file-card glass">
          <h3>🖼️ Image Converter</h3>
          <p class="subtitle">Fast local conversion for PNG, JPG, WEBP.</p>

          <div class="upload-zone" id="imgZone">
            <input
              type="file"
              id="imgInput"
              accept="image/png, image/jpeg, image/webp"
              hidden
            />
            <label for="imgInput" class="upload-label">
              <span class="upload-icon">🎨</span>
              <p>Click to browse image</p>
            </label>
          </div>

          <div class="preview-area" id="imgPreviewArea" style="display: none">
            <img id="imgPreview" src="" alt="Preview" />
            <p id="imgInfo" class="file-info">size: 0 KB</p>
          </div>

          <div class="conversion-controls">
            <label class="control-label">Convert to:</label>
            <select id="imgFormatSelect">
              <option value="image/jpeg">JPG / JPEG</option>
              <option value="image/png">PNG</option>
              <option value="image/webp">WEBP</option>
            </select>
            <button class="main-btn" onclick="convertImage()">
              ⚡ Convert & Download
            </button>
          </div>
        </section>

        <section class="file-card glass">
          <h3>📄 Document Converter</h3>
          <p class="subtitle">Convert PDF, DOCX, TXT via Node.js Server.</p>

          <div class="upload-zone" id="docZone">
            <input
              type="file"
              id="docInput"
              accept=".doc,.docx,.pdf,.txt"
              hidden
            />
            <label for="docInput" class="upload-label">
              <span class="upload-icon">📝</span>
              <p>Click to browse document</p>
            </label>
          </div>

          <div
            id="docPreviewArea"
            class="preview-area"
            style="display: none; padding: 20px 0"
          >
            <span style="font-size: 3rem">📁</span>
            <p
              id="docInfo"
              class="file-info"
              style="font-size: 1rem; color: var(--primary); font-weight: 600"
            >
              Filename.docx
            </p>
          </div>

          <div class="conversion-controls">
            <label class="control-label">Convert to:</label>
            <select id="docFormatSelect">
              <option value="PDF">PDF Document (.pdf)</option>
              <option value="DOCX">Word Document (.docx)</option>
              <option value="TXT">Plain Text (.txt)</option>
            </select>
            <button class="main-btn backend-btn" onclick="convertDocument()">
              🚀 Convert & Download
            </button>

            <p
              id="docStatus"
              style="
                text-align: center;
                margin-top: 10px;
                font-weight: 500;
                font-size: 0.9rem;
              "
            ></p>
          </div>
        </section>
      </div>
    </div>

    <button id="themeToggle">🌙</button>

    <script src="index.js"></script>
  </body>
</html>
